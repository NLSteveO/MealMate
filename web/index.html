<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2a9d8f">
  <meta name="description" content="MealMate - Personal recipe collection">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MealMate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar (desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#/" class="logo">MealMate</a>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="search" class="search-input" id="searchInput" placeholder="Search...">
      </div>
      <div class="sidebar-nav-links">
        <a href="#/" class="sidebar-nav-link active" id="sidebarRecipesLink">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Recipes</span>
        </a>
        <a href="#/planner" class="sidebar-nav-link" id="sidebarPlannerLink">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Meal Planner</span>
        </a>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div class="nav-section">
          <div class="nav-label">Categories</div>
          <div id="tagList"></div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <span class="recipe-count" id="recipeCount"></span>
      </div>
    </aside>

    <!-- Mobile header -->
    <header class="mobile-header" id="mobileHeader">
      <a href="#/" class="logo">MealMate</a>
      <button class="theme-toggle" id="themeToggleMobile" title="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <!-- Main content -->
    <main class="content" id="app">
      <div class="loading">Loading recipes...</div>
    </main>

    <!-- Mobile bottom tabs -->
    <nav class="bottom-tabs" id="bottomTabs">
      <a href="#/" class="tab-item active" data-tab="recipes" id="mobileRecipesTab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Recipes</span>
      </a>
      <a href="#/planner" class="tab-item" data-tab="planner">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Planner</span>
      </a>
      <button class="tab-item" id="mobileFilterBtn" data-tab="filter">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span>Filter</span>
      </button>
    </nav>

    <!-- Mobile filter drawer -->
    <div class="filter-drawer" id="filterDrawer">
      <div class="drawer-backdrop" id="drawerBackdrop"></div>
      <div class="drawer-panel">
        <div class="drawer-header">
          <h3>Filter by Tag</h3>
          <button class="drawer-close" id="drawerClose">&times;</button>
        </div>
        <div class="drawer-search">
          <input type="search" class="search-input" id="searchInputMobile" placeholder="Search recipes...">
        </div>
        <div id="tagListMobile" class="drawer-tags"></div>
      </div>
    </div>
    <!-- Recipe picker modal (for meal planner swap) -->
    <div class="picker-modal" id="pickerModal">
      <div class="picker-backdrop" id="pickerBackdrop"></div>
      <div class="picker-panel">
        <div class="picker-header">
          <h3>Pick a Recipe</h3>
          <button class="picker-close" id="pickerClose">&times;</button>
        </div>
        <div class="picker-search">
          <input type="search" class="search-input" id="pickerSearchInput" placeholder="Search recipes...">
        </div>
        <div class="picker-list" id="pickerList"></div>
      </div>
    </div>
  </div>

  <script src="js/matcher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
